<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="股票学习站">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="360" fill="url(#glow)"/>

  <!-- 品牌标识 -->
  <g transform="translate(96, 96)">
    <rect width="76" height="76" rx="20" fill="#ffffff" opacity="0.12"/>
    <text x="38" y="52" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">SL</text>
  </g>
  <text x="190" y="150" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="800" fill="#bfdbfe" letter-spacing="2">STOCK LEARN</text>

  <!-- 主标题 -->
  <text x="96" y="320" font-family="ui-sans-serif, 'Noto Sans SC', sans-serif" font-size="88" font-weight="900" fill="#ffffff" letter-spacing="-3">系统化股票学习站</text>

  <!-- 副标题 -->
  <text x="96" y="406" font-family="ui-sans-serif, 'Noto Sans SC', sans-serif" font-size="40" font-weight="500" fill="#cbd5e1" letter-spacing="1">K线 · 指标 · 产业链 · 交易系统 · 风险控制</text>

  <!-- 上升 K 线装饰 -->
  <g transform="translate(96, 470)" opacity="0.9">
    <rect x="0" y="44" width="16" height="44" rx="3" fill="#22c55e"/>
    <rect x="28" y="28" width="16" height="60" rx="3" fill="#22c55e"/>
    <rect x="56" y="8" width="16" height="80" rx="3" fill="#22c55e"/>
    <polyline points="8,86 36,58 64,28 92,-4" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="92" cy="-4" r="9" fill="#60a5fa"/>
  </g>

  <text x="96" y="600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="700" fill="#93c5fd">stock-learn.pages.dev</text>
</svg>
